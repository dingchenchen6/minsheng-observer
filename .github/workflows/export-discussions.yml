name: Export Discussions

on:
  workflow_dispatch:
  schedule:
    - cron: '40 1 * * *'

permissions:
  contents: write
  discussions: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Export public discussions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: dingchenchen6
          REPO_NAME: minsheng-observer
        run: python scripts/export_discussions.py

      - name: Commit exported archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/discussion_archive.json
          git diff --cached --quiet || git commit -m "chore: export discussion archive"
          git push
