  <main>
    <section class="page-hero">
      <div class="shell narrow">
        <span class="eyebrow">议题分析</span>
        <h1>把每个议题拆成可核对的层次</h1>
        <p>热点摘要、核心指标、趋势图、政策进展、论文证据和讨论摘录在同一页联动呈现，帮助你从情绪讨论回到结构性判断。</p>
      </div>
    </section>
    <section class="section-tight">
      <div class="shell">
        <div class="aurora-hero-grid" id="analysisAuroraBoard"></div>
      </div>
    </section>
    <section class="section tone-paper">
      <div class="shell split-grid">
        <div>

          <div class="card-grid" id="analysisSummaryGrid"></div>

          <div class="stack-list" id="analysisReportGrid"></div>
        </div>
      </div>

    <section class="section tone-paper">
      <div class="shell split-grid">
        <div>
          <div class="section-head compact"><span class="eyebrow">本周周报</span><h2>议题升温与结构判断</h2></div>
          <div class="stack-list" id="analysisBriefList"></div>
        </div>
        <div class="chart-wrap">
          <h3>综合关注度与证据支撑</h3>
          <div style="height:320px"><canvas id="analysisSignalChart"></canvas></div>
        </div>
      </div>
    </section>
    <section class="sticky-filter">
      <div class="shell" id="topicTabs"></div>
    </section>
    <section class="section">
      <div class="shell" id="analysisSections"></div>
    </section>
